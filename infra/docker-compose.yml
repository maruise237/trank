services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped

  backend:
    build: ../backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [redis]
    restart: unless-stopped

  worker:
    build: ../backend
    command: celery -A worker.celery_app worker --loglevel=info
    env_file: .env
    depends_on: [redis]
    restart: unless-stopped

  beat:
    build: ../backend
    command: celery -A worker.celery_app beat --loglevel=info
    env_file: .env
    depends_on: [redis]
    restart: unless-stopped
